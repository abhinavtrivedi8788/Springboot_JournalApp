spring:
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${DB_NAME}
      auto-index-creation: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    username: ${REDIS_USERNAME}
    password: ${REDIS_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

server:
  port: {PORT_NUMBER}

weather:
  api:
    key: ${WEATHER_API_KEY}

jwt:
  api:
    key: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /docs