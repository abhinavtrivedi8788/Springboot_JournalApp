spring:
  data:
    mongodb:
      uri: mongodb+srv://YOUR_USER:YOUR_PASSWORD@cluster0.foxflgi.mongodb.net/?retryWrites=true&w=majority
      database: YOUR_DATABASE
      auto-index-creation: true

  redis:
    host: host
    port: port
    username: default
    password: PWD


  mail:
    host: smtp.gmail.com
    port: 587
    username: mail Id
    password: 16 digits app password generated from google account (dummy = 1234567890123456)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

server:
  port: 8080

weather:
  api:
    key: KEY

jwt:
  api:
    key: SECRET

